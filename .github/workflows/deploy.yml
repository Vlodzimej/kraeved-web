name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ~/kraeved/kraeved-api && git pull
            cd ~/kraeved/kraeved-web && git pull

            # Build Angular on server
            cd ~/kraeved/kraeved-web
            docker run --rm -v $(pwd):/app -w /app node:20-alpine sh -c "npm install && npm run build -- --configuration=production"

            # Restart services
            cd ~/kraeved
            sudo docker compose up -d --build api
            sudo docker compose restart web
