<div class="uploader">
  <label class="upload-label">
    @if (uploadLoading()) {
      <span>Загрузка...</span>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
      <span>Загрузить изображения</span>
    }
    <input
      type="file"
      accept="image/*"
      multiple
      (change)="onFileSelected($event)"
      [disabled]="uploadLoading()"
    />
  </label>

  @if (images().length > 0) {
    <div class="image-grid">
      @for (img of images(); track img.filename) {
        <div class="image-item" [class.thumbnail]="images()[0].filename === img.filename">
          <img [src]="imageUrl(img)" [alt]="img.caption || img.filename" />
          <div class="image-actions">
            <button
              class="img-btn"
              (click)="startEditCaption(img)"
              title="Добавить подпись"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
              </svg>
            </button>
            @if (images()[0].filename !== img.filename) {
              <button
                class="img-btn"
                (click)="setAsThumbnail(img)"
                title="Сделать миниатюрой"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                </svg>
              </button>
            }
            <button
              class="img-btn img-btn-danger"
              (click)="removeImage(img)"
              title="Удалить"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
          @if (images()[0].filename === img.filename) {
            <span class="thumb-badge">Миниатюра</span>
          }
          @if (img.caption) {
            <span class="caption-badge">{{ img.caption }}</span>
          }
          @if (isEditing(img)) {
            <div class="caption-editor" (click)="$event.stopPropagation()">
              <input
                type="text"
                [(ngModel)]="editingCaptionValue"
                placeholder="Подпись к изображению"
                (keyup.enter)="saveCaption(img)"
                (keyup.escape)="cancelEditCaption()"
                autofocus
              />
              <div class="caption-editor-actions">
                <button class="caption-btn caption-btn-save" (click)="saveCaption(img)">✓</button>
                <button class="caption-btn caption-btn-cancel" (click)="cancelEditCaption()">✕</button>
              </div>
            </div>
          }
        </div>
      }
    </div>
  }
</div>
