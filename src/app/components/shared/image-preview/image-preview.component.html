@if (isOpen()) {
  <div class="image-preview-backdrop" (click)="close()">
    <div class="image-preview-container" (click)="$event.stopPropagation()">
      <button class="preview-close" (click)="close()" aria-label="Закрыть">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>

      @if (currentIndex() > 0) {
        <button class="preview-nav preview-nav-prev" (click)="prev(); $event.stopPropagation()" aria-label="Предыдущее">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      }

      <div class="preview-content">
        <img class="preview-image" [src]="currentImageUrl()" [alt]="currentImage()!.caption || currentImage()!.filename" />

        @if (currentCaption()) {
          <div class="preview-caption">{{ currentCaption() }}</div>
        }

        <div class="preview-counter">
          {{ currentIndex() + 1 }} / {{ images().length }}
        </div>
      </div>

      @if (currentIndex() < images().length - 1) {
        <button class="preview-nav preview-nav-next" (click)="next(); $event.stopPropagation()" aria-label="Следующее">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      }
    </div>
  </div>
}
