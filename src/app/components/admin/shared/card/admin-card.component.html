<div class="detail-card">
  <div class="card-header">
    <h2>{{ title() }}</h2>
    <button class="btn-close" (click)="closed.emit()">✕</button>
  </div>

  @if (loading()) {
    <div class="card-loading">Загрузка...</div>
  } @else {
    <div class="card-body">
      <ng-content />
    </div>

    <div class="card-footer">
      <button class="btn btn-save" (click)="saved.emit()">
        {{ saveLabel() }}
      </button>
    </div>
  }
</div>
