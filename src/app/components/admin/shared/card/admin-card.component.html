<app-modal
  [isOpen]="isOpen()"
  [title]="title()"
  (closed)="closed.emit()"
>
  @if (loading()) {
    <div class="card-loading">Загрузка...</div>
  } @else {
    <div class="card-body">
      <ng-content />
    </div>

    <div class="card-footer">
      <button class="btn btn-save" (click)="saved.emit()">
        {{ saveLabel() }}
      </button>
    </div>
  }
</app-modal>
