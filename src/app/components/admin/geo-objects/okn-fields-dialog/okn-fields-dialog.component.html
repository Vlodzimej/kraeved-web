<div class="okn-dialog-backdrop" (click)="onCancel()">
  <div class="okn-dialog" (click)="$event.stopPropagation()">
    <div class="okn-dialog-header">
      <h2>Данные ОКН</h2>
      <button class="okn-dialog-close" (click)="onCancel()" aria-label="Закрыть">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="okn-dialog-body">
      @for (key of fieldKeys; track key) {
        <div class="okn-field-group">
          <label>{{ fieldLabels[key] }}</label>
          <input
            type="text"
            [ngModel]="formValues()[key]"
            (ngModelChange)="onFieldChange(key, $event)"
          />
        </div>
      }
    </div>

    <div class="okn-dialog-footer">
      <button class="btn btn-secondary" (click)="onCancel()">Отмена</button>
      <button class="btn btn-primary" (click)="onSave()">Сохранить</button>
    </div>
  </div>
</div>
